<div class="example-header">
    <span >Deseja adicionar um novo item?</span>
    <button mat-button 
        matTooltip="Adicionar"
        [matTooltipPosition]="'right'"
        (click)="openDialogChosen(undefined,'A')">
        <mat-icon 
            fontIcon = "add"></mat-icon>
    </button>
</div>
<section class="example-container mat-elevation-z8" tabindex="0">
  <table mat-table [dataSource]="dataSource">

    <ng-container matColumnDef="id" sticky>
      <th mat-header-cell *matHeaderCellDef> Numero da Conta</th>
      <td mat-cell *matCellDef="let element"> {{element.id}} </td>
    </ng-container>
    <ng-container matColumnDef="name" >
      <th mat-header-cell *matHeaderCellDef> Nome </th>
      <td mat-cell *matCellDef="let element"> {{element.nome}} </td>
    </ng-container>

    <ng-container matColumnDef="description">
      <th mat-header-cell *matHeaderCellDef> Descrição </th>
      <td mat-cell *matCellDef="let element"> {{element.descricao}} </td>
    </ng-container>

    <ng-container matColumnDef="value">
      <th mat-header-cell *matHeaderCellDef> Valor </th>
      <td mat-cell *matCellDef="let element"> {{element.valor}} </td>
    </ng-container>

    <ng-container matColumnDef="edit" stickyEnd>
        <th mat-header-cell *matHeaderCellDef aria-label="row actions">&nbsp;</th>
        <td mat-cell *matCellDef="let element">
            <button mat-button 
                matTooltip="Editar"
                [matTooltipPosition]="'above'"
                (click)="openDialogChosen(element,'E')">
                <mat-icon 
                    fontIcon = "edit"></mat-icon>
            </button>
        </td>
    </ng-container>
    <ng-container matColumnDef="read" stickyEnd>
        <th mat-header-cell *matHeaderCellDef aria-label="row actions">&nbsp;</th>
        <td mat-cell *matCellDef="let element">
            <button mat-button 
                matTooltip="Consultar"
                [matTooltipPosition]="'above'"
                (click)="openDialogChosen(element,'C')">
                <mat-icon 
                    fontIcon = "visibility"></mat-icon>
            </button>
        </td>
    </ng-container>
    <ng-container matColumnDef="delete" stickyEnd>
        <th mat-header-cell *matHeaderCellDef aria-label="row actions">&nbsp;</th>
        <td mat-cell *matCellDef="let element">
            <button mat-button 
                matTooltip="Deletar"
                [matTooltipPosition]="'above'"
                (click)="openDialogChosen(element,'D')">
                <mat-icon 
                    fontIcon = "delete"></mat-icon>
            </button>
        </td>
    </ng-container>
    <ng-container matColumnDef="cash" stickyEnd>
        <th mat-header-cell *matHeaderCellDef aria-label="row actions">&nbsp;</th>
        <td mat-cell *matCellDef="let element">
            <button mat-button 
                matTooltip="Transferencia"
                [matTooltipPosition]="'above'"
                (click)="openDialogChosen(element,'T')">
                <mat-icon 
                    fontIcon = "payments"></mat-icon>
            </button>
        </td>
    </ng-container>
  
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</section>
